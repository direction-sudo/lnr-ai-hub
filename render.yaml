services:
  - type: web
    name: lnr-ai-hub-backend
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    port: 3000
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: DATABASE_URL
        value: sqlite:/app/data/lnr-ai-hub.db
      - key: KIMI_OPEN_URL
        value: https://api.moonshot.ai
      # À configurer dans le dashboard Render (Secrets) :
      # - key: KIMI_API_KEY
      #   value: sk-votre-clé
      # - key: APP_ID
      #   value: votre-app-id
      # - key: APP_SECRET
      #   value: votre-app-secret
      # - key: OWNER_UNION_ID
      #   value: votre-owner-id
      # - key: IFTTT_WEBHOOK_KEY
      #   value: votre-key-ifttt
    disk:
      name: lnr-data
      mountPath: /app/data
      sizeGB: 1
